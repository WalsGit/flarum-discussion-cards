walsgit_discussion_cards:
  forum:
    replies: "Réponses : {count}"
    unreadReplies: "Réponses non lues : {count}"
  admin:
    settings:
      general:
        where_title: "Où ?"
        where_info: "Choisissez où vous voulez utiliser des cartes de discussions"
        allowedTags_label: "Sélectionnez les étiquettes"
        allowedTags_help: "Les cartes de discussions seront activées et affichées sur les pages des étiquettes sélectionnées"
        onIndexPage_label: "Activez les cartes sur la page d'index"
        onIndexPage_help: "Si activé, la page <em>toutes les discussions</em> affichera des cartes."
        primaryCardOptions_title: "Options pour les cartes primaires"
        primaryCardOptions_info: "Choisissez combien de cartes primaires (cartes plus grandes en haut de chaque page) vous souhaitez afficher. 0 pour aucune"
        primaryCards_label: "Nombre de cartes primaires"
        primaryCards_help: "Nombre de cartes plus grandes à afficher en haut de chaque page utilisant des cartes de discussions. (nombre positif 0 ou plus)"
        desktopCardWidth_label: "Largeur des cartes primaires sur les écrans de bureau"
        desktopCardWidth_help: "Déterminez la largeur (en %) de chaque carte primaire sur les écrans de bureau. (entre 10 et 100)"
        tabletCardWidth_label: "Largeur des cartes primaires sur les écrans de tablettes"
        tabletCardWidth_help: "Déterminez la largeur (en %) de chaque carte primaire sur les écrans de tablettes. (entre 10 et 100)"
        cardOptions_title: "Options des cartes"
        cardOptions_info: "Choisissez quelles données/infos devraient être affichées sur les cartes."
        defaultImage_title: "Image par défaut globale"
        defaultImage_info: "Ici vous pouvez changer l'image par défaut qui sera utilisée sur les cartes lorsqu'aucune n'est trouvé dans le premier message d'une discussion. <u>IMPORTANT</u>: <em>Notez que modifier l'image annulera toutes les autres modifications non enregistrées des paramètres et rechargera automatiquement la page. SVP sauvegardez toutes vos modifications avant de changer l'image</em> (ou vice versa 😉). Formats acceptés : les fichiers JPG, PNG, GIF, BMP or WebP. Résolution idéale : 400px x 225px (toutes les images uploadées seront converties au format WebP et redimensionnées pour avoir une largeur de 400px, à l'exception des images avec une plus petite largeur, qui garderont leur résolution initales et ne seront pas agrandies). Selon la résolution de votre image, celle-ci pourrait appraître rognée et/ou étirée sur les cartes."
        previewText_label: "Prévisualisez le message"
        previewText_help: "Si activé, cela affichera sur les cartes le début du premier message de la discussion."
        showAuthor_label: "Affichez l'auteur"
        showAuthor_help: "Si activé, cela affichera l'auteur de la discussion sur les cartes."
        showReplies_label: "Affichez le nombre de réponses (ou de réponses non lues avec un * si applicable)"
        showReplies_help: "Si activé, cela affichera le nombre de réponses (ou de réponses non lues avec un * si applicable) sur les cartes (et les avatars des quelques participants à la discussion sur les cartes primaires)."
        showRepliesOnRight_label: "Affichez le nombre de réponses (ou de réponses non lues avec un * si applicable) à droite du titre de la carte"
        showRepliesOnRight_help: "Si l'option est activée, cela placera le nombre de réponses (ou de réponses non lues, si applicable) à droite du titre des cartes (non primaires) sur les écrans larges (au lieu d'en bas à gauche de l'image comme c'est le cas par défaut)."
        showLastPostInfo_label: "Affichez les infos du dernier post"
        showLastPostInfo_help: "Si l'option est activée, cela affichera en bas de chaque carte, le nom d'utilisateur de l'auteur de la dernière réponse de la discussion ainsi que sa date de publication."
        showBadges_label: "Affichez les badges"
        showBadges_help: "Si activé, cela affichera des badges sur les cartes en haut à gauche."
        markReadCards_label: "Différenciez les cartes des discussions lu et non lu"
        markReadCards_help: "Si activé, les discussions lues auront leur titre et texte grisés avec une police moins grasse."
        otherOptions_title: "Options qui nécessitent d'autres extensions"
        otherOptions_info: "Les options qui suivent sont dépendantes de l'installation et de l'activation d'extensions tierces pour fonctionner. <strong>IMPORTANT: merci de lire <u>l'intégralité</u> des informations de chaque option et assurez vous d'avoir réalisé toutes les étapes requises avant de l'activer</strong>."
        showViews_title_start: "Avec l'une des extensions "
        showViews_title_or: " OU "
        showViews_title_end: " installée et activtée, vous pouvez configurer l'option (1) suivante :"
        viewsExtension_notInstalled: "{icon} L'une de ces extensions doit être installée & activée pour que cette option fonctionne."
        viewsExtension_notActivated: "{icon} L'extension Discussion Views doit être activée pour que cette option fonctionne."
        showViews_label: "Affichez le nombre de vues"
        showViews_help: "Si l'option est activée, cela affichera le nombre de vues de la discussion sur sa carte."
        blogExtension_title_start: "Avec l'extention "
        blogExtension_title_end: " installée and activée, vous pouvez configurer les (2) options suivantes :"
        blogExtension_notInstalled: "{icon} Cette extension doit être installée & activée pour que ces options fonctionnent."
        blogExtension_notActivated: "{icon} Cette extension doit être activée pour que ces options fonctionnent."
        useBlogImages_label: "Utilisez l'image de l'article de blog ou celle par défaut du blog"
        useBlogImages_help: "Si l'option est activée, l'image de la carte de chaque article de blog sera déterminée comme suit : d'abord l'image de l'article (featured image) ; si aucune, la première image trouvé au sein de l'article ; si aucune, l'image par défaut de l'extension de blog ; si aucune, l'image par defaut de l'étiquette; si aucune, l'image par défaut principale des cartes de discussion. Notez que les paramètres personnalisés des étiquettes, qui seront utilisées comme catégories de blog, seront bien entendu ignorés si vous choisissez de rediriger les étiquettes de blog dans les paramètres de l'extension Flarum Blog."
        useBlogSummary_label: "Utilisez le résumé de l'article de blog pour la prévisualisation du message"
        useBlogSummary_help: "Si cette option et \"prévisualisez le message\" sont activées, les cartes des articles de blogs afficheront le début du résumé de l'article de blog au lieu du début du text de l'article."
        repostExtension_title_start: "Avec l'extention "
        repostExtension_title_end: " installée et activtée, vous pouvez configurer l'option (1) suivante :"
        repostExtension_notInstalled: "{icon} Cette extension doit être installée & activée pour que cette option fonctionne."
        repostExtension_notActivated: "{icon} Cette extension doit être activée pour que cette option fonctionne."
        allowRepostLinks_label: "Activez les liens Repost sur les cartes"
        allowRepostLinks_help: "Si l'option est activée (avec l'extension Repost), les cartes des discussions qui commence par avec une url, ouvriront l'url lorsque l'on clique sur le titre de la carte, tandis que ce sera la discussion qui s'ouvrira, comme d'habitude, lorsque que l'on cliquera sur n'importe quelle autre partie de la carte."
